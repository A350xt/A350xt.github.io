name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install theme dependencies
        run: pnpm --dir themes/Kratos-Rebirth_A350xt install --frozen-lockfile

      - name: Build theme assets
        run: pnpm --dir themes/Kratos-Rebirth_A350xt run build

      - name: Generate Pages-specific Hexo config
        shell: pwsh
        run: |
          $owner = '${{ github.repository_owner }}'
          $repo = '${{ github.event.repository.name }}'

          if ($repo.ToLower() -eq "$($owner.ToLower()).github.io") {
            $url = "https://$repo/"
            $root = "/"
          } else {
            $url = "https://$owner.github.io/$repo/"
            $root = "/$repo/"
          }

          @"
          url: $url
          root: $root
          "@ | Out-File -FilePath _config.github-pages.yml -Encoding utf8

          Write-Host "Hexo url: $url"
          Write-Host "Hexo root: $root"

      - name: Build site
        run: |
          npm run clean
          npx hexo generate --config _config.yml,_config.github-pages.yml

      - name: Add .nojekyll
        shell: pwsh
        run: New-Item -Path public/.nojekyll -ItemType File -Force | Out-Null

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
